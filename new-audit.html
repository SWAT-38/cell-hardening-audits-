<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Audit</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/js/supabase.min.js"></script>
</head>
<body class="h-full bg-dark-bg text-dark-text antialiased">
  <div id="nav"></div>
  <main class="max-w-lg mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-6">Start New Audit</h1>
    <form id="audit-form" class="bg-dark-card rounded-xl shadow border border-dark-border p-6 space-y-5">
      <div>
        <label for="auditor" class="block text-sm font-semibold mb-1 text-dark-text">Auditor Name *</label>
        <input type="text" id="auditor" required
               class="w-full bg-dark-surface border border-dark-border text-dark-text rounded-lg px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-walmart-spark placeholder-dark-muted"
               placeholder="e.g. John Smith">
      </div>
      <div>
        <label for="location" class="block text-sm font-semibold mb-1 text-dark-text">DC *</label>
        <select id="location" required
                class="w-full bg-dark-surface border border-dark-border text-dark-text rounded-lg px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-walmart-spark">
          <option value="" disabled selected>Select a DC…</option>
        </select>
      </div>
      <div>
        <label for="line_id" class="block text-sm font-semibold mb-1 text-dark-text">Cell # *</label>
        <select id="line_id" required
                class="w-full bg-dark-surface border border-dark-border text-dark-text rounded-lg px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-walmart-spark">
          <option value="" disabled selected>Select a cell…</option>
        </select>
      </div>
      <button type="submit"
              class="w-full bg-walmart-spark text-dark-bg font-semibold py-4 rounded-lg hover:brightness-110 active:brightness-90 transition text-lg">
        Start Audit →
      </button>
    </form>
  </main>
  <div id="footer"></div>

  <script src="/js/config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    initPage();

    // Populate dropdowns
    const locSel = document.getElementById('location');
    DC_OPTIONS.forEach(dc => {
      locSel.innerHTML += `<option value="${dc.value}">${dc.label}</option>`;
    });
    const cellSel = document.getElementById('line_id');
    CELL_OPTIONS.forEach(c => {
      cellSel.innerHTML += `<option value="${c}">${c}</option>`;
    });

    // Form submit
    document.getElementById('audit-form').addEventListener('submit', async e => {
      e.preventDefault();
      const auditor = document.getElementById('auditor').value.trim();
      const location = document.getElementById('location').value;
      const lineId = document.getElementById('line_id').value;
      try {
        const audit = await db.createAudit(auditor, lineId, location);
        window.location.href = `/audit.html?id=${audit.id}`;
      } catch (err) {
        alert('Failed to create audit: ' + err.message);
      }
    });
  </script>
</body>
</html>
